<!-- public/index.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Visits Counter</title>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
        }
        .card {
            background: #1e293b;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }
        p {
            font-size: 20px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="counter">0</h1>
        <p>Visits Counter 🚀</p>
    </div>

    <script>
        fetch('/visits')
        .then(res => res.json())
        .then(data => {
            document.getElementById('counter').innerText = data.visitsCounter;
        });
    </script>
</body>
</html>
